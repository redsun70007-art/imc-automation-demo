name: Teams DM 알림 발송

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 09:00 KST (UTC 월요일 00:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: '시뮬레이션만 (실제 발송 안함)'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run notify_teams.py
        env:
          TEAMS_WEBHOOK_URL_CHANNEL: ${{ secrets.TEAMS_WEBHOOK_URL_CHANNEL }}
          TEAMS_WEBHOOK_URL_DM: ${{ secrets.TEAMS_WEBHOOK_URL_DM }}
          DRY_RUN: ${{ inputs.dry_run && '1' || '' }}
        run: python notify_teams.py
